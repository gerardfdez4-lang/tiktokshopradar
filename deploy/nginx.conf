# Reverse proxy de nginx: dominio público (80/443) -> Next.js en 127.0.0.1:3000
# Copiar a /etc/nginx/sites-available/tiktok-shop-radar y enlazar a sites-enabled.
# Sustituye TU_DOMINIO por tu dominio real.

server {
    listen 80;
    server_name TU_DOMINIO www.TU_DOMINIO;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
# Tras levantar esto, ejecuta certbot para el HTTPS (ver DEPLOY.md). Certbot
# reescribe este archivo a 443 con SSL automáticamente.
